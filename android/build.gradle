
buildscript {
    repositories {
        mavenCentral()
        google()

    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.0.1'
    }
}

allprojects {
    repositories {
        mavenCentral()
        google()
    }
}


apply plugin: 'com.android.library'

android {
    namespace = 'com.uzlopak.rnserialport'
    compileSdkVersion 28
    buildToolsVersion "28.0.3"

    defaultConfig {
        minSdkVersion 16
        targetSdkVersion 28
        versionCode 1
        versionName "1.0"
    }
    lintOptions {
        abortOnError = false
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.google.guava:guava:33.5.0'
    implementation 'com.facebook.react:react-native:+'
    implementation ':usbserial-release@aar'
}
